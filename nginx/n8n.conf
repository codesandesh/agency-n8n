

# ─── n8n Nginx Reverse Proxy ───────────────────────────────────────────────
# Replace YOUR_DOMAIN_HERE with your actual domain (e.g. n8n.yourdomain.com)
# After running setup-ssl.sh, certbot will append the SSL server block below.

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # Redirect all HTTP to HTTPS once SSL is set up.
    # Comment out the return line below and uncomment the proxy block
    # if you want to test without SSL first.
    return 301 https://$host$request_uri;

    # ── Uncomment for HTTP-only testing (no SSL) ──
    # location / {
    #     proxy_pass         http://127.0.0.1:5678;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade           $http_upgrade;
    #     proxy_set_header   Connection        'upgrade';
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    #     proxy_buffering    off;
    #     proxy_read_timeout 300s;
    #     chunked_transfer_encoding on;
    # }
}

